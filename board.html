<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Corkboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📌</text></svg>">
<style>
  :root {
    --ink:#26221c; --paper:#faf7f2; --card:#fffdf9; --line:#e5ddd0; --dim:#7a7264;
    --green:#2e7d46; --greenbg:#e3f2e7;
    --blue:#2a5d8f; --bluebg:#e4eef7;
    --amber:#9a6b0a; --amberbg:#faf0d8;
    --red:#a03a2e; --redbg:#f9e5e1;
    --gray:#6b6558; --graybg:#eeeae2;
    --purple:#5e4a8f; --purplebg:#ece7f7;
    --teal:#1d6b63; --tealbg:#e0f0ee;
  }
  * { box-sizing:border-box; }
  body { margin:0; padding:0 2rem 4rem; background:var(--paper); color:var(--ink);
         font:15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #topbar { position:sticky; top:0; z-index:20; background:var(--paper); margin:0 -2rem 1rem;
            padding:1rem 2rem .7rem; border-bottom:1px solid var(--line);
            box-shadow:0 2px 6px rgba(0,0,0,.05); }
  #process { position:absolute; top:1rem; right:2rem; font:inherit; font-size:.85rem;
             padding:.3rem .9rem; border:1px solid var(--amber); border-radius:8px;
             background:var(--amberbg); color:var(--amber); font-weight:600; cursor:pointer; }
  #process:hover { filter:brightness(.97); }
  #process:disabled { opacity:.4; cursor:default; }
  #pins { display:flex; flex-wrap:wrap; gap:.4rem; margin:.6rem 0 0; }
  .pinchip { display:inline-flex; align-items:center; gap:.4rem; max-width:100%;
             background:var(--card); border:1px solid var(--amber); border-radius:999px;
             padding:.15rem .7rem; font-size:.8rem; cursor:pointer; white-space:nowrap;
             overflow:hidden; text-overflow:ellipsis; }
  .pinchip .pid { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; color:var(--dim); font-size:.72rem; }
  .pinchip b { font-weight:600; }
  .pinchip .pnext { color:var(--dim); overflow:hidden; text-overflow:ellipsis; }
  .pin-btn { cursor:pointer; border:none; background:none; font-size:.9rem; opacity:.35; padding:0 .15rem; }
  .pin-btn:hover { opacity:1; }
  .pin-btn.pinned { opacity:1; }
  .pin-btn:disabled { opacity:.15; cursor:default; }
  h1 { font-size:1.5rem; margin:0; }
  h2 { font-size:1.1rem; margin:2rem 0 .5rem; border-bottom:2px solid var(--line); padding-bottom:.3rem; }
  .sub { color:var(--dim); margin:.2rem 0 0; font-size:.85rem; }
  .badge { display:inline-block; padding:.1rem .6rem; border-radius:999px; font-size:.72rem; font-weight:600; vertical-align:middle; }
  .b-live { background:var(--greenbg); color:var(--green); }
  .b-ro   { background:var(--graybg);  color:var(--gray); }
  #controls { display:flex; flex-wrap:wrap; gap:.9rem; align-items:center; margin:.8rem 0 0;
              padding:.6rem .8rem; background:var(--card); border:1px solid var(--line); border-radius:8px; font-size:.85rem; }
  #controls label { color:var(--dim); }
  #controls button { font:inherit; font-size:.85rem; padding:.15rem .7rem; border:1px solid var(--line);
                     border-radius:5px; background:#fff; color:var(--ink); cursor:pointer; }
  #controls button:disabled { opacity:.4; cursor:default; }
  #selcount { color:var(--purple); font-weight:600; font-size:.8rem; }
  td.sel, th.sel { width:1.4rem; text-align:center; padding-left:.5rem; padding-right:0; }
  select, input[type=text] { font:inherit; font-size:.85rem; padding:.15rem .3rem;
    border:1px solid var(--line); border-radius:5px; background:#fff; color:var(--ink); }
  #filter { width:14rem; }
  table { border-collapse:collapse; width:100%; background:var(--card); box-shadow:0 1px 2px rgba(0,0,0,.05); margin-bottom:1rem; }
  th { text-align:left; font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:var(--dim);
       padding:.45rem .6rem; border-bottom:2px solid var(--line); }
  td { padding:.45rem .6rem; border-bottom:1px solid var(--line); vertical-align:top; }
  tr.item:last-child td { border-bottom:none; }
  td.id { font:12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; color:var(--dim);
          white-space:nowrap; cursor:pointer; }
  td.id:hover { color:var(--blue); }
  td.name { font-weight:600; }
  td.name .kind { font-weight:400; margin-right:.25rem; }
  td.name .path { display:block; font-size:.72rem; font-weight:400; color:var(--dim);
                  font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
  td.next { color:#3d3830; }
  td.next .one { color:var(--dim); display:block; font-size:.85rem; }
  .pill { display:inline-block; padding:.08rem .55rem; border-radius:999px; font-size:.7rem; font-weight:600;
          letter-spacing:.02em; white-space:nowrap; }
  .s-active         { background:var(--bluebg);   color:var(--blue); }
  .s-waiting        { background:var(--purplebg); color:var(--purple); }
  .s-steady         { background:var(--tealbg);   color:var(--teal); }
  .s-paused-hold    { background:var(--amberbg);  color:var(--amber); }
  .s-done           { background:var(--greenbg);  color:var(--green); }
  .s-archived       { background:var(--graybg);   color:var(--gray); }
  .who { font-size:.75rem; color:var(--dim); white-space:nowrap; }
  .flag { display:block; margin-top:.2rem; font-size:.78rem; color:var(--amber); }
  .fb-btn { cursor:pointer; border:none; background:none; font-size:.95rem; opacity:.45; padding:0 .2rem; }
  .fb-btn:hover { opacity:1; }
  .fb-btn:disabled { opacity:.15; cursor:default; }
  tr.fbrow td { background:var(--amberbg); border-bottom:1px solid var(--line); }
  tr.fbrow input { width:100%; }
  .queued { display:block; margin-top:.25rem; font-size:.78rem; color:var(--amber); }
  .queued b { font-weight:600; }
  .toast { position:fixed; bottom:1.2rem; right:1.4rem; background:var(--ink); color:var(--paper);
           padding:.5rem .9rem; border-radius:8px; font-size:.85rem; opacity:0; transition:opacity .25s; pointer-events:none; }
  .toast.show { opacity:.92; }
  .count { color:var(--dim); font-weight:400; font-size:.8rem; }
  #attn h2 { border-color:var(--purple); }
  .foot { margin-top:2.5rem; color:var(--dim); font-size:.78rem; border-top:1px solid var(--line); padding-top:.8rem; }
</style>
</head>
<body>

<div id="topbar">
<button id="process" disabled title="flag the queued notes for your desk agent to drain">🔔 Process notes</button>
<h1>📌 Corkboard <span id="mode" class="badge b-ro">…</span></h1>
<p class="sub" id="swept"></p>
<div id="pins"></div>

<div id="controls">
  <label>Group by
    <select id="groupby">
      <option value="theme">theme</option>
      <option value="status">status</option>
      <option value="owner">owner</option>
      <option value="id-asc">id ↑ (oldest first)</option>
      <option value="id-desc">id ↓ (newest first)</option>
    </select>
  </label>
  <label><input type="checkbox" id="showdone"> show done</label>
  <label><input type="checkbox" id="showarch"> show archived</label>
  <label>Filter <input type="text" id="filter" placeholder="title, next, id…"></label>
  <label>Action
    <select id="action">
      <option value="">— pick —</option>
      <option>make current</option>
      <option>mark done</option>
      <option>archive</option>
      <option>integrate</option>
      <option>don't worry about this any more</option>
      <option>background this</option>
      <option>brief me on this</option>
    </select>
  </label>
  <button id="apply" disabled>Apply</button>
  <span id="selcount"></span>
</div>
</div>

<div id="attn"></div>
<div id="groups"></div>

<p class="foot">Corkboard is a view and a routing surface, not a source of truth — status files and bg handoffs stay canonical.
Feedback notes queue in <code>inbox.jsonl</code>; the desk agent drains them. See <code>PATTERN.md</code>.</p>

<div class="toast" id="toast"></div>

<script>
const STATUS_ORDER = ["active","waiting","steady","paused-hold","done","archived"];
const KIND_GLYPH = { project:"📁", bg:"🌀", thread:"🧵" };
const API = "";  // live mode only when served same-origin by corkboard-serve

let board = JSON.parse(document.getElementById("board-data").textContent || "{}");
let live = false;
let queued = {};   // id -> [queued note/action texts]
const selected = new Set();

const $ = id => document.getElementById(id);

function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

async function init() {
  try {
    const ping = await fetch(API + "/ping");
    if (ping.ok) {
      live = true;
      board = await (await fetch(API + "/board.json")).json();
      await refreshQueued();
    }
  } catch (e) { /* no server — read-only */ }
  $("mode").textContent = live ? "live" : "read-only — run ./corkboard-serve and open http://localhost:2675 to interact";
  $("mode").className = "badge " + (live ? "b-live" : "b-ro");
  $("action").disabled = !live;
  $("process").disabled = !live;
  render();
}

async function refreshQueued() {
  queued = {};
  try {
    const events = await (await fetch(API + "/inbox.json")).json();
    for (const e of events) {
      if (e.type === "feedback") (queued[e.id] = queued[e.id] || []).push(e.text);
      if (e.type === "action")   (queued[e.id] = queued[e.id] || []).push("⚡ " + e.action);
    }
  } catch (e) { /* ignore */ }
}

function visibleItems() {
  const f = $("filter").value.trim().toLowerCase();
  const showDone = $("showdone").checked, showArch = $("showarch").checked;
  return Object.entries(board.items || {}).filter(([id, it]) => {
    if (it.status === "done" && !showDone) return false;
    if (it.status === "archived" && !showArch) return false;
    if (f) {
      const hay = (id + " " + it.title + " " + (it.oneliner||"") + " " + (it.next||"")
                   + " " + (it.owner||"") + " " + (it.theme||"")).toLowerCase();
      if (!hay.includes(f)) return false;
    }
    return true;
  });
}

function sortItems(entries) {
  return entries.sort((a, b) => {
    const s = STATUS_ORDER.indexOf(a[1].status) - STATUS_ORDER.indexOf(b[1].status);
    return s !== 0 ? s : a[1].title.localeCompare(b[1].title);
  });
}

function groupKeys(mode) {
  if (mode === "theme")  return [...(board.themes || []), null];
  if (mode === "status") return STATUS_ORDER;
  const owners = new Set(Object.values(board.items||{}).map(i => i.owner || null));
  return [...owners].sort((a,b) => String(a).localeCompare(String(b)));
}

function itemRow([id, it]) {
  const tr = document.createElement("tr");
  tr.className = "item";

  const tdSel = document.createElement("td");
  tdSel.className = "sel";
  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.checked = selected.has(id);
  cb.disabled = !live;
  cb.onchange = () => { cb.checked ? selected.add(id) : selected.delete(id); updateActionUI(); };
  tdSel.appendChild(cb);

  const tdId = document.createElement("td");
  tdId.className = "id"; tdId.textContent = id; tdId.title = "click to copy";
  tdId.onclick = () => { navigator.clipboard.writeText(id); toast("copied " + id); };

  const tdName = document.createElement("td");
  tdName.className = "name";
  tdName.innerHTML = `<span class="kind">${KIND_GLYPH[it.kind]||""}</span>${esc(it.title)}`
    + (it.path ? `<span class="path">${esc(it.path)}</span>` : "");

  const tdOwner = document.createElement("td");
  tdOwner.className = "who"; tdOwner.textContent = it.owner || "";

  const tdStatus = document.createElement("td");
  tdStatus.innerHTML = `<span class="pill s-${it.status}">${it.status}</span>`;

  const tdTheme = document.createElement("td");
  const sel = document.createElement("select");
  for (const t of [...(board.themes||[]), null]) {
    const o = document.createElement("option");
    o.value = t || ""; o.textContent = t || "— unthemed —";
    if ((it.theme||null) === t) o.selected = true;
    sel.appendChild(o);
  }
  sel.disabled = !live;
  sel.onchange = async () => {
    const theme = sel.value || null;
    const r = await post("/theme", { id, theme });
    if (r) { it.theme = theme; toast(`${id} → ${theme || "unthemed"}`); render(); }
  };
  tdTheme.appendChild(sel);

  const tdNext = document.createElement("td");
  tdNext.className = "next";
  tdNext.innerHTML = (it.oneliner ? `<span class="one">${esc(it.oneliner)}</span>` : "")
    + esc(it.next || "")
    + (it.flags || []).map(f => `<span class="flag">⚠️ ${esc(f)}</span>`).join("")
    + (queued[id] || []).map(q => `<span class="queued"><b>queued:</b> ${esc(q)}</span>`).join("");

  const tdFb = document.createElement("td");
  const btn = document.createElement("button");
  btn.className = "fb-btn"; btn.textContent = "💬"; btn.title = live ? "leave a note" : "read-only";
  btn.disabled = !live;
  btn.onclick = () => toggleFbRow(tr, id);
  tdFb.appendChild(btn);
  const pinBtn = document.createElement("button");
  pinBtn.className = "pin-btn" + (it.pinned ? " pinned" : "");
  pinBtn.textContent = "📍";
  pinBtn.title = it.pinned ? "unpin" : "pin to the top strip";
  pinBtn.disabled = !live;
  pinBtn.onclick = async () => {
    const r = await post("/pin", { id, pinned: !it.pinned });
    if (r) { it.pinned = !it.pinned; toast(it.pinned ? `pinned ${id}` : `unpinned ${id}`); render(); }
  };
  tdFb.appendChild(pinBtn);

  for (const td of [tdSel, tdId, tdName, tdOwner, tdStatus, tdTheme, tdNext, tdFb]) tr.appendChild(td);
  return tr;
}

function updateActionUI() {
  const n = selected.size;
  $("selcount").textContent = n ? `${n} selected` : "";
  $("apply").disabled = !(live && n && $("action").value);
}

function toggleFbRow(tr, id) {
  const next = tr.nextElementSibling;
  if (next && next.classList.contains("fbrow")) { next.remove(); return; }
  const row = document.createElement("tr");
  row.className = "fbrow";
  const td = document.createElement("td");
  td.colSpan = 8;
  const input = document.createElement("input");
  input.type = "text"; input.placeholder = `note for ${id} — Enter to queue, Esc to cancel`;
  input.onkeydown = async (e) => {
    if (e.key === "Escape") row.remove();
    if (e.key === "Enter" && input.value.trim()) {
      const text = input.value.trim();
      const r = await post("/feedback", { id, text });
      if (r) {
        (queued[id] = queued[id] || []).push(text);
        row.remove(); toast("queued for the desk"); render();
      }
    }
  };
  td.appendChild(input);
  row.appendChild(td);
  tr.after(row);
  input.focus();
}

async function post(path, body) {
  try {
    const r = await fetch(API + path, { method:"POST",
      headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) });
    if (!r.ok) { toast("error: " + (await r.json()).error); return false; }
    return true;
  } catch (e) { toast("server gone?"); return false; }
}

function table(entries, sorter) {
  const t = document.createElement("table");
  const hdr = document.createElement("tr");
  const thSel = document.createElement("th");
  thSel.className = "sel";
  const all = document.createElement("input");
  all.type = "checkbox";
  all.disabled = !live;
  all.title = "select all in this group";
  all.checked = entries.length > 0 && entries.every(([id]) => selected.has(id));
  all.onchange = () => {
    for (const [id] of entries) all.checked ? selected.add(id) : selected.delete(id);
    render(); updateActionUI();
  };
  thSel.appendChild(all);
  hdr.appendChild(thSel);
  hdr.insertAdjacentHTML("beforeend",
    `<th>id</th><th>item</th><th>owner</th><th>status</th><th>theme</th><th>now / next</th><th></th>`);
  t.appendChild(hdr);
  for (const e of (sorter || sortItems)(entries)) t.appendChild(itemRow(e));
  return t;
}

async function applyAction() {
  const action = $("action").value;
  if (!action || !selected.size) return;
  let n = 0;
  for (const id of [...selected]) {
    const r = await post("/action", { id, action });
    if (r) { (queued[id] = queued[id] || []).push("⚡ " + action); n++; }
  }
  selected.clear();
  $("action").value = "";
  updateActionUI();
  render();
  toast(`queued "${action}" for ${n} item${n === 1 ? "" : "s"} — the desk will act`);
}

function renderPins() {
  const div = $("pins");
  div.innerHTML = "";
  const pinned = Object.entries(board.items || {}).filter(([,it]) => it.pinned && it.status !== "archived");
  for (const [id, it] of pinned.sort((a, b) => a[0].localeCompare(b[0]))) {
    const chip = document.createElement("span");
    chip.className = "pinchip";
    chip.title = "click to copy id";
    chip.innerHTML = `📌 <span class="pid">${esc(id)}</span> <b>${esc(it.title)}</b>`
      + (it.next ? ` <span class="pnext">— ${esc(it.next)}</span>` : "");
    chip.onclick = () => { navigator.clipboard.writeText(id); toast("copied " + id); };
    div.appendChild(chip);
  }
}

function render() {
  renderPins();
  const items = visibleItems();
  const mode = $("groupby").value;
  const attnDiv = $("attn");
  const div = $("groups");

  // id mode: one flat ledger, everything sorted by id — no separate attention queue
  if (mode === "id-asc" || mode === "id-desc") {
    const desc = mode === "id-desc";
    attnDiv.innerHTML = "";
    div.innerHTML = "";
    const h = document.createElement("h2");
    h.innerHTML = `All items by id ${desc ? "↓ (newest first)" : "↑ (oldest first)"} <span class="count">(${items.length})</span>`;
    div.appendChild(h);
    div.appendChild(table(items, es => es.sort((a, b) =>
      desc ? b[0].localeCompare(a[0]) : a[0].localeCompare(b[0]))));
    $("swept").textContent =
      `${Object.keys(board.items||{}).length} items · swept ${board.swept || "?"} — staleness is expected and displayed, never hidden`;
    return;
  }

  // attention queue — waiting, always on top
  const attn = items.filter(([,it]) => it.status === "waiting");
  attnDiv.innerHTML = "";
  if (attn.length) {
    const h = document.createElement("h2");
    h.innerHTML = `⚡ Attention queue — waiting on you <span class="count">(${attn.length})</span>`;
    attnDiv.appendChild(h);
    attnDiv.appendChild(table(attn));
  }

  // grouped sections
  const rest = items.filter(([,it]) => it.status !== "waiting");
  div.innerHTML = "";
  for (const key of groupKeys(mode)) {
    const grp = rest.filter(([,it]) =>
      mode === "theme"  ? (it.theme||null) === key :
      mode === "status" ? it.status === key :
                          (it.owner||null) === (key||null));
    if (!grp.length) continue;
    const h = document.createElement("h2");
    const label = key === null || key === "" ? (mode === "theme" ? "Unthemed" : "(no owner)") : key;
    h.innerHTML = `${esc(String(label))} <span class="count">(${grp.length})</span>`;
    div.appendChild(h);
    div.appendChild(table(grp));
  }

  $("swept").textContent =
    `${Object.keys(board.items||{}).length} items · swept ${board.swept || "?"} — staleness is expected and displayed, never hidden`;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}

for (const id of ["groupby","showdone","showarch"]) $(id).onchange = render;
$("filter").oninput = render;
$("action").onchange = updateActionUI;
$("apply").onclick = applyAction;
$("process").onclick = async () => {
  try {
    const r = await fetch(API + "/process", { method: "POST",
      headers: { "Content-Type": "application/json" }, body: "{}" });
    if (r.ok) toast("flagged — your desk agent drains at session start and at natural breaks");
    else toast("error flagging");
  } catch (e) { toast("server gone?"); }
};
init();
</script>
</body>
</html>
